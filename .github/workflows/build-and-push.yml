name: Build and push image to ACR

# Builds the Docker image and pushes it to an Azure Container Registry.
#
# Authentication uses OpenID Connect (OIDC) — no long-lived credentials are
# stored. Configure these repository secrets:
#   AZURE_CLIENT_ID        – client ID of the app registration / user-assigned identity
#   AZURE_TENANT_ID        – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  – target subscription ID
#   ACR_NAME               – registry name WITHOUT the .azurecr.io suffix (e.g. "myregistry")
#
# The federated credential on the app registration must trust this repo
# (subject e.g. repo:<owner>/<repo>:ref:refs/heads/main).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE_NAME: tm-ai

permissions:
  id-token: write   # required for OIDC login to Azure
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
